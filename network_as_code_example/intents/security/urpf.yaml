# -----------------------------------------------------------------------------
# Intent type: urpf
# Purpose:     Unicast RPF strict mode on edge interfaces.
# -----------------------------------------------------------------------------

id: acme-sec-urpf-001
type: urpf
version: 1
tenant: acme-corp
change_ticket: CHG0031055
description: "uRPF — strict-mode source validation on the internet edge"

scope:
  devices: [dc-east-edge-01]

mode: strict
allow_self_ping: true
interfaces:
  - Ethernet1
  - Ethernet2

policy:
  compliance: NONE
  encryption: none

deployment:
  controller: nornir
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
