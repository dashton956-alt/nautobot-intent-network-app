# -----------------------------------------------------------------------------
# Intent type: ra_guard
# Purpose:     IPv6 RA guard on access ports.
# -----------------------------------------------------------------------------

id: acme-sec-ra-guard-001
type: ra_guard
version: 1
tenant: acme-corp
change_ticket: CHG0031053
description: "RA guard — block rogue IPv6 router advertisements at the edge"

scope:
  devices: [dc-east-access-sw-01]

policy_name: RA-GUARD-ACCESS
trusted_ports:
  - Ethernet49
untrusted_ports:
  - Ethernet1
  - Ethernet2

policy:
  compliance: NONE
  encryption: none

deployment:
  controller: nornir
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
