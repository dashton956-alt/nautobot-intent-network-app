# ─────────────────────────────────────────────────────────────────────────────
# Intent type: vtep
# Purpose:     Define the VXLAN VTEP (Virtual Tunnel Endpoint) source interface
#              and control-plane mode on leaf switches. EVPN control plane
#              replaces flood-and-learn with BGP-signalled MAC/IP binding.
# ─────────────────────────────────────────────────────────────────────────────

intent:
  id: template-vtep-001                  # MANDATORY
  type: vtep                             # MANDATORY
  version: 1                             # MANDATORY
  tenant: acme-corp                      # MANDATORY
  change_ticket: CHG00XXXXX              # MANDATORY (replace with real ticket)
  description: "VTEP Configuration — define VXLAN VTEP source and flood-and-learn or EVPN control plane"  # MANDATORY

  # ── Scope ───────────────────────────────────────────────────────────────────
  scope:
    sites:
      - dc-east
    roles:
      - leaf-switch

  # ── VTEP configuration ──────────────────────────────────────────────────────
  dc:
    vtep:
      source_interface: Loopback1        # MANDATORY — loopback used as VTEP source IP
      udp_port: 4789                     # MANDATORY (default: 4789) — VXLAN UDP port (IANA)
      flood_mode: evpn                   # MANDATORY — evpn | flood-and-learn | ingress-replication
      mcast_group: null                  # OPTIONAL — multicast group IP for BUM flooding (null = none)
      ingress_replication:               # OPTIONAL — unicast head-end replication for BUM traffic
        enabled: true
        peers:                           # OPTIONAL — remote VTEP IPs for ingress replication
          - "10.255.1.2"
          - "10.255.1.3"
      vni_map:                           # MANDATORY — VLAN-to-VNI mapping table
        - vlan: 100
          vni: 10100
        - vlan: 101
          vni: 10101
        - vlan: 200
          vni: 10200

  policy:
    compliance: NONE
    encryption: none

  # ── Deployment / Verification ────────────────────────────────────────────────
  deployment:
    controller: nornir
    strategy: rolling                    # OPTIONAL (default: rolling)
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify VTEP VXLAN interface"
        expected:
          - config_snippet: "vxlan udp-port 4789"
