# ─────────────────────────────────────────────────────────────────────────────
# Intent type: l2_access_port
# Purpose:     Configure Ethernet1 as an untagged access port on VLAN 100
#              (SERVERS-PROD) for all access-switches in DC East.
# ─────────────────────────────────────────────────────────────────────────────

intent:
  id: corp-l2-access-servers-dc-east-001  # MANDATORY
  type: l2_access_port                    # MANDATORY
  version: 1                              # MANDATORY
  tenant: acme-corp                       # MANDATORY
  change_ticket: CHG0012360               # MANDATORY (CHG + 7 digits)
  description: "Configure server-facing access ports on DC East leaf switches — VLAN 100 (SERVERS-PROD)"  # MANDATORY

  # ── Scope ───────────────────────────────────────────────────────────────────
  scope:
    sites:
      - dc-east                           # Apply to all devices at DC East
    roles:
      - access-switch                     # Restrict to access-switch role only

  # ── Port identity ───────────────────────────────────────────────────────────
  interface: Ethernet1                    # MANDATORY — exact interface name
  vlan_id: 100                            # MANDATORY — untagged VLAN (SERVERS-PROD)
  voice_vlan:                             # OPTIONAL — omit if no VoIP
  interface_description: "Server PROD — VLAN 100"  # OPTIONAL — interface description on device

  # ── Spanning tree ───────────────────────────────────────────────────────────
  portfast: true                          # OPTIONAL (default: true) — safe for server ports
  bpdu_guard: true                        # OPTIONAL (default: true) — err-disable on rogue BPDU
