# ─────────────────────────────────────────────────────────────────────────────
# Intent type: l2_access_port
# Purpose:     Configure Ethernet3 as an untagged access port on VLAN 200
#              (STORAGE) for all access-switches in DC East.
# ─────────────────────────────────────────────────────────────────────────────

intent:
  id: corp-l2-access-storage-dc-east-001  # MANDATORY
  type: l2_access_port                    # MANDATORY
  version: 1                              # MANDATORY
  tenant: acme-corp                       # MANDATORY
  change_ticket: CHG0012362               # MANDATORY (CHG + 7 digits)
  description: "Configure storage-facing access ports on DC East leaf switches — Ethernet3 on VLAN 200 (STORAGE)"  # MANDATORY

  # ── Scope ───────────────────────────────────────────────────────────────────
  scope:
    sites:
      - dc-east                           # Apply to all devices at DC East
    roles:
      - access-switch                     # Restrict to access-switch role only

  # ── Port identity ───────────────────────────────────────────────────────────
  interface: Ethernet3                    # MANDATORY — exact interface name
  vlan_id: 200                            # MANDATORY — untagged VLAN (STORAGE)
  voice_vlan:                             # OPTIONAL — omit if no VoIP
  interface_description: "Storage — VLAN 200"      # OPTIONAL — interface description on device

  # ── Spanning tree ───────────────────────────────────────────────────────────
  portfast: true                          # OPTIONAL (default: true) — safe for storage ports
  bpdu_guard: true                        # OPTIONAL (default: true) — err-disable on rogue BPDU
