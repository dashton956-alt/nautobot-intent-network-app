# ─────────────────────────────────────────────────────────────────────────────
# Intent type: l2_trunk_port
# Purpose:     Configure Ethernet50 as a second tagged trunk uplink toward the
#              spine on all DC East access-switches for redundancy / ECMP.
# ─────────────────────────────────────────────────────────────────────────────

intent:
  id: corp-l2-trunk-spine-uplink-dc-east-002  # MANDATORY
  type: l2_trunk_port                         # MANDATORY
  version: 1                                  # MANDATORY
  tenant: acme-corp                           # MANDATORY
  change_ticket: CHG0012365                   # MANDATORY (CHG + 7 digits)
  description: "Configure spine-facing trunk uplinks on DC East leaf switches — Ethernet50"  # MANDATORY

  # ── Scope ───────────────────────────────────────────────────────────────────
  scope:
    sites:
      - dc-east                               # Apply to all devices at DC East
    roles:
      - access-switch                         # Restrict to access-switch role only

  # ── Port identity ───────────────────────────────────────────────────────────
  interface: Ethernet50                       # MANDATORY — second spine uplink interface

  # ── VLAN policy ─────────────────────────────────────────────────────────────
  allowed_vlans:                              # MANDATORY — tagged VLANs permitted on trunk
    - 100                                     # SERVERS-PROD
    - 101                                     # SERVERS-DEV
    - 200                                     # STORAGE
    - 300                                     # MGMT
    - 999                                     # QUARANTINE
  native_vlan: 1                              # OPTIONAL — untagged VLAN (VLAN 1 = default)
  interface_description: "Trunk uplink to spine — Ethernet50"  # OPTIONAL — interface description
