# -----------------------------------------------------------------------------
# Intent type: 6pe_6vpe
# Purpose:     IPv6 over the MPLS core using 6PE.
# -----------------------------------------------------------------------------

id: acme-mpls-6pe-001
type: 6pe_6vpe
version: 1
tenant: acme-corp
change_ticket: CHG0031042
description: "6PE — carry IPv6 prefixes across the IPv4 MPLS core"

scope:
  devices: [pe-router-lon-01]

mode: 6pe
vrf: ""
neighbor_ip: 10.255.0.2
ipv6_networks:
  - "2001:db8:100::/48"
  - "2001:db8:200::/48"

policy:
  compliance: NONE
  encryption: none

deployment:
  controller: nornir
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
