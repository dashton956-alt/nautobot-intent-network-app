# -----------------------------------------------------------------------------
# Intent type: pseudowire
# Purpose:     Point-to-point pseudowire (EoMPLS) between PEs.
# -----------------------------------------------------------------------------

id: acme-mpls-pw-001
type: pseudowire
version: 1
tenant: acme-corp
change_ticket: CHG0031046
description: "Pseudowire — EoMPLS attachment circuit to the remote PE"

scope:
  devices: [pe-router-lon-01]

pw_id: 100
remote_pe: 10.255.0.2
encapsulation: mpls
interface: Ethernet5
vlan: 300
mtu: 1500

policy:
  compliance: NONE
  encryption: none

deployment:
  controller: nornir
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
