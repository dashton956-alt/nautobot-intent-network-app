# ─────────────────────────────────────────────────────────────────────────────
# Intent type: l2_trunk_port
# Purpose:     Configure an 802.1Q trunk port with an explicit list of allowed
#              VLANs. Used for switch uplinks and hypervisor connections.
# ─────────────────────────────────────────────────────────────────────────────

id: acme-trunk-port-001                # MANDATORY
type: l2_trunk_port                    # MANDATORY
version: 1                             # MANDATORY
tenant: acme-corp                      # MANDATORY
description: "Uplink leaf-01 Gi0/24 to spine-01 — dual-10G trunk"  # MANDATORY (>=10 chars)
change_ticket: CHG0030003              # MANDATORY (CHG + 7 digits)
approved_by: ""                        # OPTIONAL here

# ── Scope ─────────────────────────────────────────────────────────────────────
scope:
  devices: [leaf-01]                   # MANDATORY — trunk intents normally target one device
  # sites: [dc-east]
  # roles: [leaf-switch]
  # all_tenant_devices: true

# ── Port identity ─────────────────────────────────────────────────────────────
interface: GigabitEthernet0/24         # MANDATORY — exact interface name as in Nautobot

# ── VLAN membership ───────────────────────────────────────────────────────────
allowed_vlans: [100, 200, 300, 400]    # MANDATORY — explicit list of VLANs this trunk carries
                                       #   Best practice: list only what is needed
                                       #   Avoid 'all' — it permits future VLANs automatically

native_vlan: 999                       # OPTIONAL (default: 1) — untagged VLAN on this trunk
                                       #   Best practice: use a dedicated unused VLAN, NOT VLAN 1
                                       #   Must match on both ends of the link

interface_description: "UPLINK → spine-01 Gi0/1"   # OPTIONAL — interface description on device

# ── Deployment ────────────────────────────────────────────────────────────────
deployment:
  strategy: rolling                    # OPTIONAL (default: rolling)
  save_config: true                    # OPTIONAL (default: true)

# ── Verification ──────────────────────────────────────────────────────────────
verification:
  level: basic                         # OPTIONAL (default: basic)
  trigger: on_deploy                   # OPTIONAL (default: on_deploy)
  fail_action: rollback                # OPTIONAL — rollback recommended for trunk misconfigurations
                                       #   that can cause broadcast storms or black-holes
