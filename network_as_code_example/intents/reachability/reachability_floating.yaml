# -----------------------------------------------------------------------------
# Intent type: reachability_floating
# Purpose:     Floating static backup route behind an SLA track.
# -----------------------------------------------------------------------------

id: acme-reach-floating-001
type: reachability_floating
version: 1
tenant: acme-corp
change_ticket: CHG0031035
description: "Reachability floating — AD-250 backup default via LTE"

scope:
  devices: [branch-lon-rtr-01]

routes:
  - prefix: "0.0.0.0/0"
    next_hop: 192.168.90.1
    admin_distance: 250
    track: 10
    name: lte-backup-default

policy:
  compliance: NONE
  encryption: none

deployment:
  controller: nornir
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
