# -----------------------------------------------------------------------------
# Intent type: service_proxy
# Purpose:     Transparent service insertion via a proxy node.
# -----------------------------------------------------------------------------

id: acme-service-proxy-001
type: service_proxy
version: 1
tenant: acme-corp
change_ticket: CHG0031027
description: "Service proxy — transparent web-proxy insertion for user VLANs"

scope:
  devices: [dc-east-core-01]

service_node: proxy-dc-east-01
insertion_type: transparent
redirect_acl: ACL-WEB-REDIRECT
pbr_policy: PBR-TO-PROXY

policy:
  compliance: NONE
  encryption: none

deployment:
  controller: nornir
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
