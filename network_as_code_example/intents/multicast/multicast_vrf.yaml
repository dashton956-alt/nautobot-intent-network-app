# -----------------------------------------------------------------------------
# Intent type: multicast_vrf
# Purpose:     Multicast routing inside a tenant VRF.
# -----------------------------------------------------------------------------

id: acme-mc-vrf-001
type: multicast_vrf
version: 1
tenant: acme-corp
change_ticket: CHG0031040
description: "Multicast VRF — sparse-mode PIM in VRF MEDIA"

scope:
  devices: [dc-east-core-01]

vrf: MEDIA
pim_mode: sparse-mode
rp_address: 10.255.0.10
mdt_default_group: ""
interfaces:
  - Ethernet3

policy:
  compliance: NONE
  encryption: none

deployment:
  controller: nornir
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
