# -----------------------------------------------------------------------------
# Intent type: sdwan_qos
# Purpose:     Per-class SD-WAN QoS scheduling on WAN uplinks.
# -----------------------------------------------------------------------------

id: acme-sdwan-qos-001
type: sdwan_qos
version: 1
tenant: acme-corp
change_ticket: CHG0031022
description: "SD-WAN QoS — 4-class scheduler on branch WAN uplinks"

scope:
  devices: [branch-lon-sdwan-01]

policy_name: SDWAN-QOS-BRANCH
scheduler: SDWAN-SCHED-4C
classes:
  - name: REALTIME
    bandwidth_percent: 20
    queue: 0
  - name: BUSINESS
    bandwidth_percent: 40
    queue: 1
  - name: DEFAULT
    bandwidth_percent: 30
    queue: 2
  - name: SCAVENGER
    bandwidth_percent: 10
    queue: 3

policy:
  compliance: NONE
  encryption: none

deployment:
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
