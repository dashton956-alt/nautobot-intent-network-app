# -----------------------------------------------------------------------------
# Intent type: sdwan_app_policy
# Purpose:     Application-aware routing policy with SLA classes.
# -----------------------------------------------------------------------------

id: acme-sdwan-app-policy-001
type: sdwan_app_policy
version: 1
tenant: acme-corp
change_ticket: CHG0031019
description: "SD-WAN app policy — voice via MPLS, SaaS via DIA"

scope:
  devices: [branch-lon-sdwan-01]

policy_name: APP-ROUTE-PROD
applications:
  - name: voip
    sla_class: REALTIME
    preferred_color: mpls
  - name: office365
    sla_class: BUSINESS
    preferred_color: biz-internet
sla_classes:
  - name: REALTIME
    latency_ms: 100
    loss_pct: 1
    jitter_ms: 30
  - name: BUSINESS
    latency_ms: 250
    loss_pct: 3
    jitter_ms: 100

policy:
  compliance: NONE
  encryption: none

deployment:
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
