# ─────────────────────────────────────────────────────────────────────────────
# Intent type: mgmt_ntp
# Purpose:     Configure NTP servers on all tenant network devices to ensure
#              synchronized clocks. Required for accurate log timestamps,
#              certificate validity, and time-sensitive protocols (OSPF, BGP).
# ─────────────────────────────────────────────────────────────────────────────

intent:
  id: corp-mgmt-ntp-all-sites-001        # MANDATORY
  type: mgmt_ntp                         # MANDATORY
  version: 1                             # MANDATORY
  tenant: acme-corp                      # MANDATORY
  change_ticket: CHG0012356              # MANDATORY (CHG + 7 digits)
  description: "NTP configuration — all network devices — primary and secondary NTP servers"  # MANDATORY

  # ── Scope ───────────────────────────────────────────────────────────────────
  scope:
    all_tenant_devices: true             # MANDATORY — NTP must apply to every device

  # ── NTP servers ─────────────────────────────────────────────────────────────
  management:
    ntp_servers:                         # MANDATORY — at least one NTP server
      - "10.0.0.1"                       # Primary internal NTP server
      - "10.0.0.2"                       # Secondary internal NTP server
      - "pool.ntp.org"                   # OPTIONAL — public fallback NTP pool

  policy:
    compliance: NONE
    encryption: none

  # ── Deployment / Verification ────────────────────────────────────────────────
  deployment:
    controller: nornir
    strategy: rolling                    # OPTIONAL (default: rolling)
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify NTP servers in running config"
        expected:
          - config_snippet: "ntp server 10.0.0.1"
          - config_snippet: "ntp server 10.0.0.2"
          - config_snippet: "ntp server pool.ntp.org"
