# ─────────────────────────────────────────────────────────────────────────────
# Intent type: mgmt_dns_dhcp
# Purpose:     Configure DNS resolver and DHCP client settings on all devices.
#              Internal DNS servers provide name resolution; DHCP client is
#              used only for OOB management interface addressing via the MGMT VRF.
# ─────────────────────────────────────────────────────────────────────────────

intent:
  id: template-mgmt-dns-dhcp-001         # MANDATORY
  type: mgmt_dns_dhcp                    # MANDATORY
  version: 1                             # MANDATORY
  tenant: acme-corp                      # MANDATORY
  change_ticket: CHG00XXXXX              # MANDATORY (replace with real ticket)
  description: "DNS / DHCP — configure DNS resolver and DHCP client settings on all devices"  # MANDATORY

  # ── Scope ───────────────────────────────────────────────────────────────────
  scope:
    all_tenant_devices: true             # MANDATORY — DNS must apply to every device

  # ── DNS / DHCP configuration ────────────────────────────────────────────────
  management:
    dns:
      servers:                           # MANDATORY — at least one DNS server
        - "10.1.1.10"
        - "10.1.1.11"
      search_domains:                    # OPTIONAL — domain search list for hostname resolution
        - "acme-corp.internal"
        - "mgmt.acme-corp.internal"
      domain_name: "acme-corp.internal"  # OPTIONAL — primary DNS domain
    dhcp:
      client_id: hostname                # OPTIONAL — DHCP client-id sent in discover
      default_gateway_override: false    # OPTIONAL — false = ignore DHCP-provided default GW
      vrf: MGMT                          # OPTIONAL — VRF scope for DHCP client

  policy:
    compliance: NONE
    encryption: none

  # ── Deployment / Verification ────────────────────────────────────────────────
  deployment:
    controller: nornir
    strategy: rolling                    # OPTIONAL (default: rolling)
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify DNS servers configured"
        expected:
          - config_snippet: "ip name-server 10.1.1.10"
          - config_snippet: "ip domain-name acme-corp.internal"
