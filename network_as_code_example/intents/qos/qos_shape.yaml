# -----------------------------------------------------------------------------
# Intent type: qos_shape
# Purpose:     Shape the WAN uplink to the carrier CIR.
# -----------------------------------------------------------------------------

id: acme-qos-shape-001
type: qos_shape
version: 1
tenant: acme-corp
change_ticket: CHG0031031
description: "QoS shaping — 100 Mbps parent shaper on the WAN uplink"

scope:
  devices: [branch-lon-rtr-01]

policy_map: PM-SHAPE-WAN
rate_bps: 100000000
burst_bytes: 1250000
child_policy: PM-QUEUE-WAN
apply_interfaces:
  - GigabitEthernet0/0/0

policy:
  compliance: NONE
  encryption: none

deployment:
  controller: nornir
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
