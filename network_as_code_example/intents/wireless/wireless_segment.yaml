# -----------------------------------------------------------------------------
# Intent type: wireless_segment
# Purpose:     Client isolation and inter-VLAN policy for the IoT SSID.
# -----------------------------------------------------------------------------

id: acme-wl-segment-001
type: wireless_segment
version: 1
tenant: acme-corp
change_ticket: CHG0031009
description: "Wireless segmentation — isolate IoT clients behind an ACL"

scope:
  devices: [wlc-dc-east-01]

ssid_name: IOT-WIFI
client_isolation: true
inter_vlan_acl: ACL-IOT-RESTRICT
group_policy: IOT-DEVICES

policy:
  compliance: NONE
  encryption: none

deployment:
  controller: wlc
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
