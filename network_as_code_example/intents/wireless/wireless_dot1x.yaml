# -----------------------------------------------------------------------------
# Intent type: wireless_dot1x
# Purpose:     802.1X/EAP enterprise authentication for the corporate SSID.
# -----------------------------------------------------------------------------

id: acme-wl-dot1x-001
type: wireless_dot1x
version: 1
tenant: acme-corp
change_ticket: CHG0031002
description: "Wireless 802.1X — EAP-PEAP auth against corporate RADIUS"

scope:
  devices: [wlc-dc-east-01]

ssid_name: CORP-SECURE
eap_method: PEAP
certificate_profile: CORP-CA
radius_servers:
  - ip: 10.0.0.20
    auth_port: 1812
    acct_port: 1813
  - ip: 10.0.0.21
    auth_port: 1812
    acct_port: 1813

policy:
  compliance: NONE
  encryption: none

deployment:
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
