# -----------------------------------------------------------------------------
# Intent type: hybrid_dns
# Purpose:     Hybrid DNS forwarding between on-prem and the cloud resolver.
# -----------------------------------------------------------------------------

id: acme-hybrid-dns-001
type: hybrid_dns
version: 1
tenant: acme-corp
change_ticket: CHG0031018
description: "Hybrid DNS — conditional forwarding for cloud-hosted zones"

scope:
  devices: [dc-east-edge-01]

provider: aws
vpc_id: vpc-0aa11bb22cc33dd44
forward_zones:
  - zone: acme-corp.internal
    forwarders: [10.0.0.10, 10.0.0.11]
resolver_endpoints:
  - direction: outbound
    subnet_id: subnet-0a1b2c3d4e5f6a7b8
private_zones:
  - prod.acme-corp.cloud

policy:
  compliance: NONE
  encryption: none

deployment:
  controller: cloud
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
