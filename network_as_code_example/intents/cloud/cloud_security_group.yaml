# -----------------------------------------------------------------------------
# Intent type: cloud_security_group
# Purpose:     Security group for the web tier.
# -----------------------------------------------------------------------------

id: acme-cloud-sg-001
type: cloud_security_group
version: 1
tenant: acme-corp
change_ticket: CHG0031015
description: "Cloud security group — web tier ingress/egress rules"

scope:
  devices: [dc-east-edge-01]

provider: aws
security_group_name: acme-web-tier-sg
vpc_id: vpc-0aa11bb22cc33dd44
inbound_rules:
  - protocol: tcp
    port: 443
    source: "0.0.0.0/0"
  - protocol: tcp
    port: 80
    source: "0.0.0.0/0"
outbound_rules:
  - protocol: tcp
    port: 5432
    destination: "10.20.30.0/24"

policy:
  compliance: NONE
  encryption: none

deployment:
  controller: cloud
  strategy: rolling
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
