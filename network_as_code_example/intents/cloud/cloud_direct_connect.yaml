# ─────────────────────────────────────────────────────────────────────────────
# Intent type: cloud_direct_connect
# Purpose:     Configure a dedicated cloud circuit (AWS Direct Connect,
#              Azure ExpressRoute, Google Cloud Interconnect) including
#              BGP session and BFD.
# ─────────────────────────────────────────────────────────────────────────────

id: acme-cloud-dx-prod-001            # MANDATORY
type: cloud_direct_connect            # MANDATORY
version: 1                            # MANDATORY
tenant: acme-corp                     # MANDATORY
description: "AWS Direct Connect — DC-East to us-east-1 — 1Gbps hosted connection"  # MANDATORY
change_ticket: CHG0030071             # MANDATORY (CHG + 7 digits)
approved_by: "cloud.engineer"         # OPTIONAL here; MANDATORY when OPA enforce is on

scope:
  all_tenant_devices: true            # MANDATORY (cloud intents don't use device scope)

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  CONNECTION IDENTITY (MANDATORY)                                       ║
# ╚══════════════════════════════════════════════════════════════════════════╝

provider: aws                         # MANDATORY — aws | azure | gcp

connection_id: dxcon-0a1b2c3d4e      # MANDATORY — the cloud provider's connection/circuit ID
                                      #   AWS:   dxcon-xxxxxxxx
                                      #   Azure: /subscriptions/<id>/...
                                      #   GCP:   interconnects/<name>

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  VIRTUAL INTERFACE / BGP (OPTIONAL)                                    ║
# ╚══════════════════════════════════════════════════════════════════════════╝

vlan: 4001                            # OPTIONAL — VLAN for the virtual interface (1–4094)
                                      #   AWS: VIF VLAN ID; Azure: PeeringType VLAN

bgp_asn: 65001                        # OPTIONAL — our BGP ASN for the DX/ER session
                                      #   Must match ASN configured on the on-prem CE device

bgp_auth_key: ""                      # OPTIONAL — BGP MD5 authentication key
                                      #   Use Nautobot Secrets in production

address_family: ipv4                  # OPTIONAL (default: ipv4) — ipv4 | ipv6 | dual

bfd: true                             # OPTIONAL (default: true) — BFD for fast failover detection
                                      #   Recommended for active/standby DX configurations

# ── Deployment / Verification ─────────────────────────────────────────────────
deployment:
  strategy: rolling                   # OPTIONAL (default: rolling)
  save_config: true

verification:
  level: nuts                         # OPTIONAL — verifies BGP session UP, prefixes received
  trigger: both
  fail_action: rollback
