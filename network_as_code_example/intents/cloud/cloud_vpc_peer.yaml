# ─────────────────────────────────────────────────────────────────────────────
# Intent type: cloud_vpc_peer
# Purpose:     Create a VPC peering (AWS) or VNet peering (Azure) connection
#              between two cloud networks. Pushed via CloudAdapter.
# NOTE: scope.devices is not used — cloud intents target VPC/VNet IDs directly.
# ─────────────────────────────────────────────────────────────────────────────

id: acme-cloud-vpc-peer-prod-dev-001  # MANDATORY
type: cloud_vpc_peer                  # MANDATORY
version: 1                            # MANDATORY
tenant: acme-corp                     # MANDATORY
description: "VPC peering — Production to Development VPCs — internal traffic"  # MANDATORY
change_ticket: CHG0030070             # MANDATORY (CHG + 7 digits)
approved_by: "cloud.engineer"         # OPTIONAL here

scope:
  all_tenant_devices: true            # MANDATORY (scope required by schema, but cloud intents
                                      # resolve without devices — use all_tenant_devices: true)

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PEERING IDENTITY (MANDATORY)                                          ║
# ╚══════════════════════════════════════════════════════════════════════════╝

provider: aws                         # MANDATORY — aws | azure | gcp
                                      #   aws   — creates a VPC Peering Connection
                                      #   azure — creates a VNet Peering
                                      #   gcp   — creates a VPC Network Peering

requester_vpc: vpc-0a1b2c3d4e5f       # MANDATORY — VPC/VNet ID of the initiating side
accepter_vpc: vpc-9f8e7d6c5b4a        # MANDATORY — VPC/VNet ID of the accepting side

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  CROSS-ACCOUNT / CROSS-REGION (OPTIONAL)                              ║
# ╚══════════════════════════════════════════════════════════════════════════╝

requester_account: "123456789012"     # OPTIONAL — AWS account ID (omit for same-account)
accepter_account: "987654321098"      # OPTIONAL — cross-account peering target account

requester_region: us-east-1           # OPTIONAL — AWS region of requester VPC
accepter_region: us-west-2            # OPTIONAL — AWS region of accepter (for inter-region peering)

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PEERING OPTIONS (OPTIONAL)                                            ║
# ╚══════════════════════════════════════════════════════════════════════════╝

auto_accept: true                     # OPTIONAL (default: true) — auto-accept the peering request
                                      #   Set false for cross-account (manual acceptance needed)

dns_resolution: true                  # OPTIONAL (default: false) — allow DNS resolution across
                                      #   the peering (so private DNS names resolve from either VPC)

# ── Deployment / Verification ─────────────────────────────────────────────────
deployment:
  strategy: rolling                   # OPTIONAL (default: rolling)
  save_config: true

verification:
  level: basic
  trigger: on_deploy
  fail_action: alert
