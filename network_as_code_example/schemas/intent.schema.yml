---
# intent.schema.yml
# pykwalify schema for all intent YAML files.
# Validates structure and required fields before intents reach Nautobot.
# Run: pykwalify -d <intent-file>.yaml -s intent.schema.yml
#
# NOTE: Two file formats exist in this repo:
#   Newer files (management/, layer2/, security/, dc_evpn/, etc.): root-level fields
#   Older files (l2/, l3/, mgmt/, dc/, connectivity/):             intent: { ... } wrapper
# The schema validates root-level fields. Both formats are accepted because
# matching-rule: any at the top level allows the 'intent:' key as an optional map.

type: map
matching-rule: any
mapping:

  # ── Legacy intent: wrapper (older file format) ─────────────────────────────
  intent:
    type: map
    required: false
    matching-rule: any
    allowempty: true

  # ══════════════════════════════════════════════════════════════════════════
  # UNIVERSAL REQUIRED FIELDS
  # ══════════════════════════════════════════════════════════════════════════
  id:
    type: str
    required: false
    pattern: "^[a-z0-9][a-z0-9-]{2,198}[a-z0-9]$"

  type:
    type: str
    required: false
    enum:
      # Layer 2
      - vlan_provision
      - l2_access_port
      - l2_trunk_port
      - lag
      - mlag
      - stp_policy
      - qinq
      - pvlan
      - storm_control
      - port_security
      - dhcp_snooping
      - dai
      - ip_source_guard
      - macsec
      # Layer 3
      - static_route
      - ospf
      - bgp_ebgp
      - bgp_ibgp
      - bgp_isp
      - isis
      - eigrp
      - route_redistribution
      - route_policy
      - prefix_list
      - vrf_basic
      - bfd
      - pbr
      - ipv6_dual_stack
      - ospfv3
      - bgp_ipv6_af
      - fhrp
      # MPLS / SP
      - mpls_l3vpn
      - mpls_l2vpn
      - pseudowire
      - evpn_mpls
      - ldp
      - rsvp_te
      - sr_mpls
      - srv6
      - 6pe_6vpe
      - mvpn
      # DC / EVPN
      - evpn_vxlan_fabric
      - l2vni
      - l3vni
      - bgp_evpn_af
      - anycast_gateway
      - vtep
      - evpn_multisite
      - dc_underlay
      - dc_mlag
      # Security
      - connectivity
      - security
      - acl
      - zbf
      - ipsec_s2s
      - ipsec_ikev2
      - gre_tunnel
      - gre_over_ipsec
      - dmvpn
      - macsec_policy
      - copp
      - urpf
      - dot1x_nac
      - aaa
      - fw_rule
      - ra_guard
      - ssl_inspection
      # WAN / SD-WAN
      - wan_uplink
      - sdwan_overlay
      - sdwan_app_policy
      - sdwan_qos
      - sdwan_dia
      - nat_pat
      - nat64
      - wan_failover
      # Wireless
      - wireless_ssid
      - wireless_vlan_map
      - wireless_dot1x
      - wireless_guest
      - wireless_rf
      - wireless_qos
      - wireless_band_steer
      - wireless_roam
      - wireless_segment
      - wireless_mesh
      - wireless_flexconnect
      # Cloud / Hybrid
      - cloud_vpc_peer
      - cloud_transit_gw
      - cloud_direct_connect
      - cloud_vpn_gw
      - cloud_bgp
      - cloud_security_group
      - cloud_nat
      - cloud_route_table
      - hybrid_dns
      - cloud_sdwan
      # QoS
      - qos_classify
      - qos_dscp_mark
      - qos_cos_remark
      - qos_queue
      - qos_police
      - qos_shape
      - qos_trust
      # Multicast
      - multicast_pim_sm
      - multicast_pim_ssm
      - igmp_snooping
      - multicast_vrf
      - msdp
      # Management
      - mgmt_ntp
      - mgmt_dns_dhcp
      - mgmt_snmp
      - mgmt_syslog
      - mgmt_netflow
      - mgmt_telemetry
      - mgmt_ssh
      - mgmt_aaa
      - mgmt_aaa_device
      - mgmt_netconf
      - mgmt_motd
      - mgmt_lldp_cdp
      - mgmt_interface
      - mgmt_stp_root
      - mgmt_dhcp_server
      - mgmt_global_config
      # Reachability
      - reachability_static
      - reachability_bgp_network
      - reachability_floating
      - reachability_ip_sla
      # Service
      - service_lb_vip
      - service_dns
      - service_dhcp
      - service_nat
      - service_proxy

  version:
    type: int
    required: false
    range:
      min: 1

  tenant:
    type: str
    required: false

  change_ticket:
    type: str
    required: false
    pattern: "^(CHG|INC|REQ|TASK)[0-9]{5,10}$"

  description:
    type: str
    required: false

  # ── Optional universal fields ──────────────────────────────────────────────
  approved_by:
    type: str
    required: false

  status:
    type: str
    required: false
    enum:
      - draft
      - validated
      - deploying
      - deployed
      - failed
      - rolled_back
      - deprecated

  hostname:
    type: str
    required: false

  domain_name:
    type: str
    required: false

  # ══════════════════════════════════════════════════════════════════════════
  # SCOPE
  # ══════════════════════════════════════════════════════════════════════════
  scope:
    type: map
    required: false
    matching-rule: any
    mapping:
      all_tenant_devices:
        type: bool
        required: false
      site:
        type: str
        required: false
      sites:
        type: seq
        required: false
        sequence:
          - type: str
      device:
        type: str
        required: false
      devices:
        type: seq
        required: false
        sequence:
          - type: str
      role:
        type: str
        required: false
      roles:
        type: seq
        required: false
        sequence:
          - type: str
      tags:
        type: seq
        required: false
        sequence:
          - type: str
      platform:
        type: str
        required: false

  # ══════════════════════════════════════════════════════════════════════════
  # ADDITIONAL ROOT-LEVEL FIELDS (flat-form intents)
  # ══════════════════════════════════════════════════════════════════════════
  # Fields used by flat (non-`intent:`-wrapped) example intents across the
  # L3 / security / wireless / cloud domains.
  vlan:
    type: int
    required: false
  group_id:
    type: int
    required: false
  hello_interval:
    type: int
    required: false
  dead_interval:
    type: int
    required: false
  preempt_delay:
    type: int
    required: false
  priority_active:
    type: int
    required: false
  priority_standby:
    type: int
    required: false
  max_clients:
    type: int
    required: false
  autorp_scope:
    type: int
    required: false
  interface_description:
    type: str
    required: false
  neighbor_description:
    type: str
    required: false
  channel_id:
    type: int
    required: false
  lacp_mode:
    type: str
    required: false
  port_mode:
    type: str
    required: false
  pfs_group:
    type: int
    required: false
  local_network:
    type: str
    required: false
  remote_network:
    type: str
    required: false
  tunnel:
    type: any
    required: false
  member_interfaces:
    type: seq
    required: false
    sequence:
      - type: any
  ports:
    type: seq
    required: false
    sequence:
      - type: map
        allowempty: true
        matching-rule: any
  always:
    type: bool
    required: false
  passive_default:
    type: bool
    required: false
  broadcast_ssid:
    type: bool
    required: false
  authentication:
    type: any
    required: false
  timers:
    type: any
    required: false
  security:
    type: any
    required: false
  stub_areas:
    type: seq
    required: false
    sequence:
      - type: any
  nssa_areas:
    type: seq
    required: false
    sequence:
      - type: any
  no_passive:
    type: seq
    required: false
    sequence:
      - type: any
  routes:
    type: seq
    required: false
    sequence:
      - type: map
        allowempty: true
        matching-rule: any
  entries:
    type: seq
    required: false
    sequence:
      - type: map
        allowempty: true
        matching-rule: any
  peers:
    type: seq
    required: false
    sequence:
      - type: map
        allowempty: true
        matching-rule: any

  # ══════════════════════════════════════════════════════════════════════════
  # MANAGEMENT (canonical wrapper for mgmt_* intent config)
  # ══════════════════════════════════════════════════════════════════════════
  # mgmt_* intents nest their type-specific config under `management.<subtype>`
  # (e.g. management.ssh, management.snmp, management.aaa_device). Permissive so
  # each subtype block validates without enumerating every field here.
  management:
    type: map
    required: false
    allowempty: true
    matching-rule: any

  # ══════════════════════════════════════════════════════════════════════════
  # POLICY (shared across all intent types)
  # ══════════════════════════════════════════════════════════════════════════
  policy:
    type: map
    required: false
    mapping:
      compliance:
        type: str
        required: false
        enum: [PCI-DSS, HIPAA, SOC2, ISO27001, NONE, none]
      encryption:
        type: str
        required: false
        enum: [tls, required, preferred, none]
      max_latency_ms:
        type: int
        required: false
      min_prefixes:
        type: int
        required: false
      tenant_asn:
        type: int
        required: false
      max_vrfs:
        type: int
        required: false

  # ══════════════════════════════════════════════════════════════════════════
  # DEPLOYMENT
  # ══════════════════════════════════════════════════════════════════════════
  deployment:
    type: map
    required: false
    mapping:
      controller:
        type: str
        required: false
        enum: [nornir, catalyst_center, meraki, mist, ansible, nautobot]
      controller_site:
        type: str
        required: false
      controller_org:
        type: str
        required: false
      strategy:
        type: str
        required: false
        enum: [all_at_once, canary, rolling]
      save_config:
        type: bool
        required: false

  # ══════════════════════════════════════════════════════════════════════════
  # VERIFICATION
  # ══════════════════════════════════════════════════════════════════════════
  verification:
    type: map
    required: false
    mapping:
      level:
        type: str
        required: false
        enum: [basic, nuts]
      trigger:
        type: str
        required: false
        enum: [on_deploy, scheduled, both]
      schedule:
        type: str
        required: false
      fail_action:
        type: str
        required: false
        enum: [alert, rollback, remediate]
      tests:
        type: seq
        required: false
        sequence:
          - type: map
            mapping:
              test_class:
                type: str
                required: true
                enum:
                  # NAPALM tests
                  - TestNapalmBgpNeighbors
                  - TestNapalmBgpNeighborsCount
                  - TestNapalmArp
                  - TestNapalmArpRange
                  - TestNapalmInterfaces
                  - TestNapalmLldpNeighbors
                  - TestNapalmLldpNeighborsCount
                  - TestNapalmPing
                  - TestNapalmConfig
                  - TestNapalmUsers
                  - TestNapalmOnlyDefinedUsersExist
                  - TestNapalmVlans
                  - TestNapalmInterfaceInVlan
                  - TestNapalmOnlyDefinedVlansExist
                  - TestNapalmNetworkInstances
                  - TestNapalmRunningConfigContains
                  - TestNapalmOspfNeighbors
                  - TestNapalmOspfNeighborsCount
                  - TestNapalmMplsLdpNeighbors
                  - TestNapalmEnvironment
                  - TestNapalmFacts
                  - TestNapalmRouteTable
                  - TestNapalmMacTable
                  - TestNapalmIpRoute
                  # Netmiko tests
                  - TestNetmikoCdpNeighbors
                  - TestNetmikoCdpNeighborsCount
                  - TestNetmikoOspfNeighbors
                  - TestNetmikoOspfNeighborsCount
                  - TestNetmikoIperf
                  - TestNetmikoBgpSummary
                  - TestNetmikoVxlanVtep
                  - TestNetmikoMplsForwarding
                  - TestNetmikoIsisNeighbors
              label:
                type: str
                required: false
              test_execution:
                type: map
                required: false
                allowempty: true
              expected:
                type: seq
                required: false
                sequence:
                  - type: map
                    matching-rule: any
                    allowempty: true
              test_data:
                type: seq
                required: false
                sequence:
                  - type: map
                    matching-rule: any
                    allowempty: true

  # ══════════════════════════════════════════════════════════════════════════
  # CONNECTIVITY (source / destination / isolation)
  # ══════════════════════════════════════════════════════════════════════════
  source:
    type: map
    required: false
    mapping:
      group:
        type: str
        required: false
      sites:
        type: seq
        required: false
        sequence:
          - type: str
      devices:
        type: seq
        required: false
        sequence:
          - type: str

  destination:
    type: map
    required: false
    mapping:
      external:
        type: bool
        required: false
      provider:
        type: str
        required: false
      prefixes:
        type: seq
        required: false
        sequence:
          - type: str
      group:
        type: str
        required: false
      sites:
        type: seq
        required: false
        sequence:
          - type: str

  isolation:
    type: map
    required: false
    mapping:
      deny_groups:
        type: seq
        required: false
        sequence:
          - type: str
      deny_protocols:
        type: seq
        required: false
        sequence:
          - type: str
            enum: [telnet, http, ftp, snmpv1, snmpv2, rsh, rlogin, tftp]

  # ══════════════════════════════════════════════════════════════════════════
  # LAYER 2 — PORT AND VLAN FIELDS
  # ══════════════════════════════════════════════════════════════════════════
  interface:
    type: str
    required: false

  vlan_id:
    type: int
    required: false
    range:
      min: 1
      max: 4094

  voice_vlan:
    type: int
    required: false
    range:
      min: 1
      max: 4094

  portfast:
    type: bool
    required: false

  bpdu_guard:
    type: bool
    required: false

  shutdown:
    type: bool
    required: false

  speed:
    type: int
    required: false

  duplex:
    type: str
    required: false
    enum: [full, half, auto]

  mtu:
    type: int
    required: false
    range:
      min: 64
      max: 65535

  native_vlan:
    type: int
    required: false
    range:
      min: 1
      max: 4094

  allowed_vlans:
    type: any        # str range ("100-200") or list of VLAN IDs
    required: false

  trunk_groups:
    type: seq
    required: false
    sequence:
      - type: str

  # VLAN provisioning
  vlans:
    type: seq
    required: false
    sequence:
      - type: map
        mapping:
          id:
            type: int
            required: true
            range:
              min: 1
              max: 4094
          name:
            type: str
            required: true
          description:
            type: str
            required: false
          vrf:
            type: str
            required: false
          ip_address:
            type: str
            required: false
          ipv6_address:
            type: str
            required: false
          active:
            type: bool
            required: false

  # LAG / Port-channel
  lag_id:
    type: int
    required: false
  lag_mode:
    type: str
    required: false
    enum: [active, passive, "on", static]
  lag_members:
    type: seq
    required: false
    sequence:
      - type: str
  min_links:
    type: int
    required: false
  hash_mode:
    type: str
    required: false

  # MLAG
  mlag_domain_id:
    type: str
    required: false
  mlag_peer_link:
    type: str
    required: false
  mlag_peer_address:
    type: str
    required: false
  mlag_local_interface:
    type: str
    required: false
  mlag_reload_delay:
    type: int
    required: false
  mlag_vlan:
    type: int
    required: false
    range:
      min: 1
      max: 4094
  mlag_subnet:
    type: str
    required: false
  mlag_peer_link_members:
    type: seq
    required: false
    sequence:
      - type: str

  # STP policy / root bridge
  mode:
    type: str
    required: false
  priority:
    type: int
    required: false
  root_vlans:
    type: seq
    required: false
    sequence:
      - type: str
  diameter:
    type: int
    required: false
  hello_time:
    type: int
    required: false
  forward_delay:
    type: int
    required: false
  max_age:
    type: int
    required: false
  secondary:
    type: map
    required: false
    mapping:
      device_role:
        type: str
        required: false
      priority:
        type: int
        required: false

  # Storm control
  broadcast_level:
    type: int
    required: false
  multicast_level:
    type: int
    required: false
  unicast_level:
    type: int
    required: false
  storm_action:
    type: str
    required: false
    enum: [shutdown, trap, none]
  storm_interfaces:
    type: seq
    required: false
    sequence:
      - type: str

  # Port security
  max_mac_addresses:
    type: int
    required: false
  violation_action:
    type: str
    required: false
    enum: [shutdown, restrict, protect]
  sticky_mac:
    type: bool
    required: false
  aging_time:
    type: int
    required: false
  port_security_interfaces:
    type: seq
    required: false
    sequence:
      - type: str

  # DHCP snooping
  trusted_interfaces:
    type: seq
    required: false
    sequence:
      - type: str
  rate_limit:
    type: int
    required: false
  vlan_range:
    type: str
    required: false
  option82_enabled:
    type: bool
    required: false

  # DAI (Dynamic ARP Inspection)
  dai_vlans:
    type: seq
    required: false
    sequence:
      - type: str
  trusted_ports:
    type: seq
    required: false
    sequence:
      - type: str
  arp_rate_limit:
    type: int
    required: false
  dai_log_buffer:
    type: int
    required: false

  # IP source guard
  ip_source_guard_interfaces:
    type: seq
    required: false
    sequence:
      - type: str

  # PVLAN
  pvlan_type:
    type: str
    required: false
    enum: [isolated, community, promiscuous]
  primary_vlan:
    type: int
    required: false
    range:
      min: 1
      max: 4094
  secondary_vlan:
    type: int
    required: false
    range:
      min: 1
      max: 4094
  pvlan_interfaces:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true

  # QinQ (802.1ad)
  outer_vlan:
    type: int
    required: false
    range:
      min: 1
      max: 4094
  inner_vlan:
    type: int
    required: false
    range:
      min: 1
      max: 4094
  qinq_interfaces:
    type: seq
    required: false
    sequence:
      - type: str
  service_provider_vlan:
    type: int
    required: false

  # MACsec (L2 per-interface)
  macsec_policy_name:
    type: str
    required: false
  cipher_suite:
    type: str
    required: false
    enum: [gcm-aes-128, gcm-aes-256, gcm-aes-xpn-128, gcm-aes-xpn-256]
  key_server_priority:
    type: int
    required: false
    range:
      min: 0
      max: 255
  macsec_interfaces:
    type: seq
    required: false
    sequence:
      - type: str
  include_icv_indicator:
    type: bool
    required: false
  replay_protection:
    type: bool
    required: false
  replay_window:
    type: int
    required: false

  # ══════════════════════════════════════════════════════════════════════════
  # LAYER 3 — ROUTING FIELDS
  # ══════════════════════════════════════════════════════════════════════════
  local_asn:
    type: int
    required: false

  neighbor_ip:
    type: str
    required: false

  neighbor_asn:
    type: int
    required: false

  vrf:
    type: str
    required: false

  router_id:
    type: str
    required: false

  # BGP session parameters
  route_map_in:
    type: str
    required: false
  route_map_out:
    type: str
    required: false
  prefix_list_in:
    type: str
    required: false
  prefix_list_out:
    type: str
    required: false
  max_prefix:
    type: int
    required: false
  allowas_in:
    type: int
    required: false
  timers_keepalive:
    type: int
    required: false
  timers_hold:
    type: int
    required: false
  password:
    type: str
    required: false
  multihop:
    type: int
    required: false
  local_preference:
    type: int
    required: false
  send_community:
    type: str
    required: false
  maximum_paths:
    type: int
    required: false
  bfd:
    type: bool
    required: false
  graceful_restart:
    type: bool
    required: false
  default_originate:
    type: bool
    required: false
  update_source:
    type: str
    required: false
  route_reflector_client:
    type: bool
    required: false
  next_hop_self:
    type: bool
    required: false
  soft_reconfiguration:
    type: bool
    required: false
  address_family:
    type: str
    required: false

  # BGP neighbors list
  neighbors:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true

  bgp_networks:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true

  # OSPF
  process_id:
    type: int
    required: false
  area:
    type: str
    required: false
  area_type:
    type: str
    required: false
    enum: [normal, stub, nssa, totally-stub, totally-nssa]
  ospf_interfaces:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true
  passive_interfaces:
    type: seq
    required: false
    sequence:
      - type: str
  default_information_originate:
    type: bool
    required: false
  reference_bandwidth:
    type: int
    required: false
  redistribute:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true
  networks:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true

  # IS-IS
  net:
    type: str
    required: false
  level:
    type: str
    required: false
    enum: [level-1, level-2, level-1-2]
  metric_style:
    type: str
    required: false
    enum: [narrow, wide, transition]
  isis_interfaces:
    type: seq
