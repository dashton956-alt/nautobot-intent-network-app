    type: map
    required: false
    mapping:
      client_id:
        type: str
        required: false
      default_gateway_override:
        type: bool
        required: false
      vrf:
        type: str
        required: false
  dns_servers:
    type: seq
    required: false
    sequence:
      - type: str
  dns_domain_list:
    type: seq
    required: false
    sequence:
      - type: str

  # SNMP
  snmp_version:
    type: str
    required: false
  snmp_community:
    type: str
    required: false
  snmp_location:
    type: str
    required: false
  snmp_contact:
    type: str
    required: false
  snmp_trap_targets:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true
  snmp_users:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true
  snmp_views:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true

  # Syslog
  syslog_servers:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true
  syslog_source_interface:
    type: str
    required: false
  syslog_trap_level:
    type: str
    required: false
    enum: [emergencies, alerts, critical, errors, warnings, notifications, informational, debugging]

  # SSH management
  ssh_version:
    type: int
    required: false
    enum: [1, 2]
  ssh_timeout:
    type: int
    required: false
  ssh_ciphers:
    type: map
    required: false
    mapping:
      kex:
        type: seq
        required: false
        sequence:
          - type: str
      ciphers:
        type: seq
        required: false
        sequence:
          - type: str
      macs:
        type: seq
        required: false
        sequence:
          - type: str
  vty_lines:
    type: map
    required: false
    mapping:
      first:
        type: int
        required: false
      last:
        type: int
        required: false
      exec_timeout_minutes:
        type: int
        required: false
      exec_timeout_seconds:
        type: int
        required: false
      access_class:
        type: str
        required: false
      transport_input:
        type: str
        required: false
  ssh_allowed_prefixes:
    type: seq
    required: false
    sequence:
      - type: str
  ssh_max_sessions:
    type: int
    required: false

  # AAA (management type — structured)
  aaa:
    type: map
    required: false
    matching-rule: any
    allowempty: true

  # NETCONF / RESTCONF / gNMI
  netconf_enabled:
    type: bool
    required: false
  netconf_port:
    type: int
    required: false
  netconf_vrf:
    type: str
    required: false
  restconf_enabled:
    type: bool
    required: false
  restconf_port:
    type: int
    required: false
  gnmi_enabled:
    type: bool
    required: false
  gnmi_port:
    type: int
    required: false
  gnmi_transport:
    type: str
    required: false
    enum: [grpc, grpc-tls]

  # Telemetry (gRPC dial-out)
  telemetry_destination:
    type: str
    required: false
  telemetry_port:
    type: int
    required: false
  telemetry_transport:
    type: str
    required: false
    enum: [grpc, grpc-tls]
  telemetry_encoding:
    type: str
    required: false
    enum: [gpb, gpb-kv, json-ietf]
  telemetry_subscriptions:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true

  # NetFlow / IPFIX
  netflow_version:
    type: str
    required: false
  netflow_collectors:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true
  netflow_source_interface:
    type: str
    required: false
  sampling_mode:
    type: str
    required: false
    enum: [deterministic, random, none]
  sampling_rate:
    type: int
    required: false
  flow_timeout_active:
    type: int
    required: false
  flow_timeout_inactive:
    type: int
    required: false

  # Banners / MOTD
  login_banner:
    type: str
    required: false
  motd_banner:
    type: str
    required: false
  exec_banner:
    type: str
    required: false
  banner_delimiter:
    type: str
    required: false

  # LLDP / CDP
  lldp_enabled:
    type: bool
    required: false
  cdp_enabled:
    type: bool
    required: false
  lldp_holdtime:
    type: int
    required: false
  lldp_reinit:
    type: int
    required: false
  lldp_timer:
    type: int
    required: false
  lldp_interface_overrides:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true

  # Interface (management Loopback / OOB)
  loopback:
    type: map
    required: false
    mapping:
      name:
        type: str
        required: true
      description:
        type: str
        required: false
      ip_range:
        type: str
        required: false
      mtu:
        type: int
        required: false
  oob_management:
    type: map
    required: false
    mapping:
      name:
        type: str
        required: true
      description:
        type: str
        required: false
      vrf:
        type: str
        required: false
      speed:
        type: int
        required: false
      duplex:
        type: str
        required: false
      shutdown:
        type: bool
        required: false
  additional_loopbacks:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true

  # DHCP server pools (mgmt_dhcp_server — pools key shared with service section above)

  # Global config bundle (mgmt_global_config)
  dhcp_pools:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true

  # ══════════════════════════════════════════════════════════════════════════
  # WIRELESS (controller-managed — fields pushed to WLC/Mist/Meraki)
  # ══════════════════════════════════════════════════════════════════════════
  ssid_name:
    type: str
    required: false
    range:
      min: 1
      max: 32

  security_mode:
    type: str
    required: false
    enum: [wpa3-enterprise, wpa3-personal, wpa2-enterprise, wpa2-personal, open]

  band:
    type: str
    required: false
    enum: [2.4ghz, 5ghz, 6ghz, dual, tri]

  hidden:
    type: bool
    required: false

  client_isolation:
    type: bool
    required: false

  rate_limit_down_mbps:
    type: int
    required: false

  rate_limit_up_mbps:
    type: int
    required: false

  captive_portal_url:
    type: str
    required: false

  fast_roaming:
    type: bool
    required: false

  band_steering:
    type: bool
    required: false

  ap_groups:
    type: seq
    required: false
    sequence:
      - type: str

  radius_server_group:
    type: str
    required: false

  # ══════════════════════════════════════════════════════════════════════════
  # CLOUD (pushed via cloud provider API adapters)
  # ══════════════════════════════════════════════════════════════════════════
  provider:
    type: str
    required: false
    enum: [aws, azure, gcp, generic]

  region:
    type: str
    required: false

  account_id:
    type: str
    required: false

  requester_vpc:
    type: str
    required: false

  accepter_vpc:
    type: str
    required: false

  requester_account:
    type: str
    required: false

  accepter_account:
    type: str
    required: false

  requester_region:
    type: str
    required: false

  accepter_region:
    type: str
    required: false

  auto_accept:
    type: bool
    required: false

  dns_resolution:
    type: bool
    required: false

  connection_id:
    type: str
    required: false

  bgp_asn:
    type: int
    required: false

  bgp_auth_key:
    type: str
    required: false

  bandwidth_mbps:
    type: int
    required: false

  cloud_rules:
    type: seq
    required: false
    sequence:
      - type: map
        matching-rule: any
        allowempty: true
