  description: "IPSec IKEv2 site-to-site tunnel — London branch to DC East"

  tunnel:
    local_endpoint: "203.0.113.10"
    remote_endpoint: "198.51.100.50"
    tunnel_type: ipsec_s2s
    ike_version: 2
    auth_method: psk
    encryption: aes-256-gcm
    integrity: sha256
    dh_group: 14
