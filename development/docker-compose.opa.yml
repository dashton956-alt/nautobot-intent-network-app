---
# Standalone OPA service for local development and integration testing.
#
# Usage (standalone — OPA on http://localhost:8181, nautobot uses OPA_URL=http://localhost:8181):
#   docker compose -f docker-compose.opa.yml up -d
#   docker compose -f docker-compose.opa.yml down
#
# Usage (alongside the main stack so nautobot can reach OPA via http://opa:8181):
#   docker compose -f docker-compose.base.yml -f docker-compose.opa.yml up -d
#
# OPA unit tests (Rego):
#   docker run --rm \
#     -v "$(pwd)/opa/policies:/policies:ro" \
#     -v "$(pwd)/opa/tests:/tests:ro" \
#     openpolicyagent/opa:latest test /policies /tests --v0-compatible -v

services:
  opa:
    image: "openpolicyagent/opa:latest"
    container_name: "intent-opa"
    ports:
      - "8181:8181"
    volumes:
      - "./opa/policies:/policies:ro"
    command:
      - "run"
      - "--server"
      - "--addr"
      - "0.0.0.0:8181"
      - "--watch"
      - "--v0-compatible"
      - "--log-level"
      - "info"
      - "/policies"
    healthcheck:
      test: ["CMD", "/opa", "eval", "--format", "raw", "1==1"]
      interval: "5s"
      timeout: "3s"
      start_period: "10s"
      retries: 5
